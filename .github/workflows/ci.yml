name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Run linter
      run: |
        make lint-style
    
    - name: Run type checker
      run: |
        make lint-type
    
    - name: Run tests with coverage
      run: |
        make test
    
    - name: Check coverage threshold
      run: |
        COVERAGE=$(python -m pytest tests/ --cov=app --cov=framework --cov-report=term 2>&1 | grep TOTAL | awk '{print $4}' | sed 's/%//')
        echo "Total coverage: ${COVERAGE}%"
        if (( $(echo "${COVERAGE} < 80" | bc -l) )); then
          echo "❌ Coverage ${COVERAGE}% is below threshold 80%"
          exit 1
        fi
        echo "✅ Coverage ${COVERAGE}% meets threshold"
    
    - name: Check no file below 60%
      run: |
        FAILURES=$(python -m pytest tests/ --cov=app --cov=framework --cov-report=term-missing 2>&1 | grep -E "(0\.00%|[0-5][0-9]\.[0-9]+%)" | grep -v "100.00%" || true)
        if [ -n "$FAILURES" ]; then
          echo "❌ Files with coverage below 60%:"
          echo "$FAILURES"
          exit 1
        fi
        echo "✅ All files meet minimum coverage"
