[tool.mypy]
python_version = "3.11"
warn_return_any = false
warn_unused_ignores = false
disallow_untyped_defs = false
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["app.tasks.*"]
ignore_errors = true

[[tool.mypy.overrides]]
module = ["app.core.*"]
ignore_errors = true

[[tool.mypy.overrides]]
module = ["app.report.generator"]
ignore_errors = true

[[tool.mypy.overrides]]
module = ["app.api.deps"]
ignore_errors = true
